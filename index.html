<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronunciation Tool</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 1.5rem;
        color: #1f2937;
        background: #f8fafc;
      }
      form {
        margin-bottom: 1.5rem;
      }
      .search-field {
        position: relative;
        width: 100%;
        max-width: 480px;
      }
      #word-search {
        width: 100%;
        padding: 0.75rem 3rem 0.75rem 0.9rem;
        border: 1px solid #d1d5db;
        border-radius: 9999px;
        font-size: 1rem;
        line-height: 1.5;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      #word-search:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
      }
      .search-button {
        position: absolute;
        top: 50%;
        right: 0.5rem;
        transform: translateY(-50%);
        border: none;
        background: transparent;
        color: #4b5563;
        cursor: pointer;
        width: 2.2rem;
        height: 2.2rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        border-radius: 9999px;
      }
      .search-button:hover {
        background: rgba(15, 23, 42, 0.06);
      }
      .search-button:focus-visible {
        outline: 2px solid #6366f1;
        outline-offset: 2px;
      }
      .phonetics {
        border: 1px solid #e5e7eb;
        background: #ffffff;
        border-radius: 16px;
        padding: 1rem;
      }
      .phonetic-item {
        display: grid;
        grid-template-columns: 1fr 160px;
        gap: 1rem;
        align-items: start;
        padding: 0.85rem 0;
        border-bottom: 1px solid #f3f4f6;
      }
      .phonetic-item:last-child {
        border-bottom: none;
      }
      .phonetic-content {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .phonetic-main {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .phonetic-text {
        font-size: 1.4rem;
        font-weight: 700;
      }
      button.play-audio {
        padding: 0.55rem 0.85rem;
        border: none;
        border-radius: 12px;
        background: #eef2ff;
        cursor: pointer;
        font-size: 1rem;
      }
      button.play-audio:hover {
        background: #dde6ff;
      }
      .slow-speed-label {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.95rem;
      }
      .slow-speed-label span {
        color: #374151;
      }
      .mouth-shape {
        justify-self: center;
      }
      .mouth-figure {
        width: 108px;
        height: 80px;
        background: url('close-mouth.png') center/contain no-repeat;
        background-color: transparent;
        position: relative;
        overflow: visible;
        transform-origin: center;
        transition: transform 0.18s ease, background-image 0.1s ease;
      }
      .mouth-figure::before,
      .mouth-figure .upper,
      .mouth-figure .lower {
        display: none;
      }
      .mouth-figure.speaking {
        animation: mouthPulse 0.18s ease-in-out infinite alternate;
      }
      @keyframes mouthPulse {
        from { transform: scale(1); }
        to { transform: scale(1.02); }
      }
      .mouth-frame-0 { background-image: url('close-mouth.png'); }
      .mouth-frame-1 { background-image: url('half-open-mouth.png'); }
      .mouth-frame-2 { background-image: url('open-mouth.png'); }
      .mouth-frame-3 { background-image: url('half-open-mouth.png'); }
    </style>
</head>
<body>
    <form id="dictionary-form">
        <label for="word-search">Enter an English word:</label>
        <div class="search-field">
          <input id="word-search" type="search" name="word" placeholder="Type or paste a word" autocomplete="off" />
          <button type="submit" class="search-button" aria-label="Search">🔍</button>
        </div>
    </form>
    
    <div id="result"></div>
    <script src="script.js"></script>
</body>
</html>
