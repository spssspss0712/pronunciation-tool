<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronunciation Tool</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 1.5rem;
        color: #1f2937;
        background: #f8fafc;
      }
      form {
        margin-bottom: 1.5rem;
      }
      .search-field {
        position: relative;
        width: 100%;
        max-width: 480px;
      }
      #word-search {
        width: 100%;
        padding: 0.75rem 5rem 0.75rem 0.9rem;
        border: 1px solid #d1d5db;
        border-radius: 9999px;
        font-size: 1rem;
        line-height: 1.5;
        outline: none;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      #word-search:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
      }
      .voice-button,
      .search-button {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        border: none;
        background: transparent;
        color: #4b5563;
        cursor: pointer;
        width: 2.2rem;
        height: 2.2rem;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        border-radius: 9999px;
      }
      .voice-button {
        right: 2.8rem;
      }
      .search-button {
        right: 0.5rem;
      }
      .voice-button:hover,
      .search-button:hover {
        background: rgba(15, 23, 42, 0.06);
      }
      .voice-button:focus-visible,
      .search-button:focus-visible {
        outline: 2px solid #6366f1;
        outline-offset: 2px;
      }
      .voice-overlay {
        position: absolute;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.92);
        border-radius: 9999px;
        pointer-events: none;
      }
      .voice-overlay.active {
        display: flex;
      }
      .voice-overlay-box {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.5rem 0.85rem;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid #cbd5e1;
        border-radius: 9999px;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
      }
      .voice-overlay .voice-icon {
        font-size: 1.2rem;
      }
      .voice-status {
        font-size: 0.95rem;
        color: #334155;
      }
      .voice-wave {
        display: inline-flex;
        gap: 0.25rem;
        align-items: flex-end;
        height: 1rem;
      }
      .voice-wave span {
        width: 0.2rem;
        height: 0.25rem;
        background: #6366f1;
        border-radius: 9999px;
        opacity: 0.2;
        transform-origin: bottom;
        transition: height 0.2s ease, opacity 0.2s ease;
      }
      .voice-wave.active span:nth-child(1) { height: 0.6rem; opacity: 1; }
      .voice-wave.active span:nth-child(2) { height: 0.95rem; opacity: 1; }
      .voice-wave.active span:nth-child(3) { height: 0.7rem; opacity: 1; }
      .voice-wave.active span:nth-child(4) { height: 1rem; opacity: 1; }
      .voice-wave.active span:nth-child(5) { height: 0.8rem; opacity: 1; }
      .phonetics {
        border: 1px solid #e5e7eb;
        background: #ffffff;
        border-radius: 16px;
        padding: 1rem;
      }
      .phonetic-item {
        display: grid;
        grid-template-columns: 1fr 160px;
        gap: 1rem;
        align-items: start;
        padding: 0.85rem 0;
        border-bottom: 1px solid #f3f4f6;
      }
      .phonetic-item:last-child {
        border-bottom: none;
      }
      .example {
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
        padding: 0.4rem 0;
      }
      .example button.play-sentence {
        border: none;
        background: transparent;
        color: #4b5563;
        cursor: pointer;
        padding: 0.2rem 0.35rem;
        font-size: 1rem;
        border-radius: 9999px;
      }
      .example button.play-sentence:hover {
        background: rgba(15, 23, 42, 0.06);
      }
      .example button.play-sentence:focus-visible {
        outline: 2px solid #6366f1;
        outline-offset: 2px;
      }
      .example-text {
        flex: 1;
        line-height: 1.5;
      }
      .phonetic-content {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .phonetic-main {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .phonetic-text {
        font-size: 1.4rem;
        font-weight: 700;
      }
      button.play-audio {
        padding: 0.55rem 0.85rem;
        border: none;
        border-radius: 12px;
        background: #eef2ff;
        cursor: pointer;
        font-size: 1rem;
      }
      button.play-audio:hover {
        background: #dde6ff;
      }
      .slow-speed-label {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.95rem;
      }
      .slow-speed-label span {
        color: #374151;
      }
      .mouth-shape {
        justify-self: center;
      }
      .mouth-figure {
        width: 108px;
        height: 80px;
        background: url('close-mouth.png') center/contain no-repeat;
        background-color: transparent;
        position: relative;
        overflow: visible;
        transform-origin: center;
        transition: transform 0.18s ease, background-image 0.1s ease;
      }
      .mouth-figure::before,
      .mouth-figure .upper,
      .mouth-figure .lower {
        display: none;
      }
      .mouth-figure.speaking {
        animation: mouthPulse 0.18s ease-in-out infinite alternate;
      }
      @keyframes mouthPulse {
        from { transform: scale(1); }
        to { transform: scale(1.02); }
      }
      .mouth-frame-0 { background-image: url('close-mouth.png'); }
      .mouth-frame-1 { background-image: url('half-open-mouth.png'); }
      .mouth-frame-2 { background-image: url('open-mouth.png'); }
      .mouth-frame-3 { background-image: url('half-open-mouth.png'); }
    </style>
</head>
<body>
    <form id="dictionary-form">
        <label for="word-search">Enter an English word:</label>
        <div class="search-field">
          <input id="word-search" type="search" name="word" placeholder="Type, paste, or speak a word" autocomplete="off" />
          <button type="button" class="voice-button" aria-label="Voice search">🎤</button>
          <button type="submit" class="search-button" aria-label="Search">🔍</button>
          <div class="voice-overlay" aria-hidden="true">
            <div class="voice-overlay-box">
              <span class="voice-icon">🎙️</span>
              <span class="voice-status">Listening…</span>
              <span class="voice-wave" aria-hidden="true">
                <span></span><span></span><span></span><span></span><span></span>
              </span>
            </div>
          </div>
        </div>
    </form>
    
    <div id="result"></div>
    <script src="script.js"></script>
</body>
</html>
