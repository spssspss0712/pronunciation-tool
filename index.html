<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronunciation Tool</title>
</head>
<body>
    <form id="dictionary-form">
        <label for="word-search">Enter an English word:</label>
        <input id="word-search" type="search" name="word" placeholder="Type or paste a word" autocomplete="off" />
        <button type="submit">Search</button>
    </form>
    <div id="result"></div>
    <script src="script.js"></script>
</body>
</html>
