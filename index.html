<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronunciation Tool</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 1.5rem;
        color: #1f2937;
        background: #f8fafc;
      }
      form {
        margin-bottom: 1.5rem;
      }
      .phonetics {
        border: 1px solid #e5e7eb;
        background: #ffffff;
        border-radius: 16px;
        padding: 1rem;
      }
      .phonetic-item {
        display: grid;
        grid-template-columns: 1fr 160px;
        gap: 1rem;
        align-items: start;
        padding: 0.85rem 0;
        border-bottom: 1px solid #f3f4f6;
      }
      .phonetic-item:last-child {
        border-bottom: none;
      }
      .phonetic-content {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .phonetic-main {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .phonetic-text {
        font-size: 1.4rem;
        font-weight: 700;
      }
      button.play-audio {
        padding: 0.55rem 0.85rem;
        border: none;
        border-radius: 12px;
        background: #eef2ff;
        cursor: pointer;
        font-size: 1rem;
      }
      button.play-audio:hover {
        background: #dde6ff;
      }
      .slow-speed-label {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.95rem;
      }
      .slow-speed-label span {
        color: #374151;
      }
      .mouth-shape {
        justify-self: center;
      }
      .mouth-figure {
        width: 108px;
        height: 80px;
        background: url('close-mouth.png') center/contain no-repeat;
        background-color: transparent;
        position: relative;
        overflow: visible;
        transform-origin: center;
        transition: transform 0.18s ease, background-image 0.1s ease;
      }
      .mouth-figure::before,
      .mouth-figure .upper,
      .mouth-figure .lower {
        display: none;
      }
      .mouth-figure.speaking {
        animation: mouthPulse 0.18s ease-in-out infinite alternate;
      }
      @keyframes mouthPulse {
        from { transform: scale(1); }
        to { transform: scale(1.02); }
      }
      .mouth-frame-0 { background-image: url('close-mouth.png'); }
      .mouth-frame-1 { background-image: url('half-open-mouth.png'); }
      .mouth-frame-2 { background-image: url('open-mouth.png'); }
      .mouth-frame-3 { background-image: url('half-open-mouth.png'); }
    </style>
</head>
<body>
    <form id="dictionary-form">
        <label for="word-search">Enter an English word:</label>
        <input id="word-search" type="search" name="word" placeholder="Type or paste a word" autocomplete="off" />
        <button type="submit">Search</button>
    </form>
    <section id="history" style="display:none; margin-top: 1rem;">
        <h3>Search History</h3>
        <ul id="history-list"></ul>
    </section>
    <div id="result"></div>
    <script src="script.js"></script>
</body>
</html>
