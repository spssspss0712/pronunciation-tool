<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronunciation Tool</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 1.5rem;
        color: #1f2937;
        background: #f8fafc;
      }
      form {
        margin-bottom: 1.5rem;
      }
      .phonetics {
        border: 1px solid #e5e7eb;
        background: #ffffff;
        border-radius: 16px;
        padding: 1rem;
      }
      .phonetic-item {
        display: grid;
        grid-template-columns: 1fr 160px;
        gap: 1rem;
        align-items: start;
        padding: 0.85rem 0;
        border-bottom: 1px solid #f3f4f6;
      }
      .phonetic-item:last-child {
        border-bottom: none;
      }
      .phonetic-content {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .phonetic-main {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .phonetic-text {
        font-size: 1.4rem;
        font-weight: 700;
      }
      button.play-audio {
        padding: 0.55rem 0.85rem;
        border: none;
        border-radius: 12px;
        background: #eef2ff;
        cursor: pointer;
        font-size: 1rem;
      }
      button.play-audio:hover {
        background: #dde6ff;
      }
      .slow-speed-label {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.95rem;
      }
      .slow-speed-label span {
        color: #374151;
      }
      .mouth-shape {
        justify-self: center;
      }
      .mouth-figure {
        width: 108px;
        height: 80px;
        background: #f9d6cc;
        border: 2px solid #c76b5d;
        border-radius: 55% 55% 50% 50%;
        position: relative;
        overflow: hidden;
        box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.08);
      }
      .mouth-figure::before {
        content: '';
        position: absolute;
        width: 72px;
        height: 32px;
        background: radial-gradient(circle at 50% 20%, rgba(255, 255, 255, 0.8), transparent 55%), #7f1d1d;
        border-radius: 50% / 40%;
        top: 38px;
        left: 50%;
        transform: translateX(-50%);
        opacity: 0.7;
      }
      .mouth-figure .upper,
      .mouth-figure .lower {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 999px;
        transition: top 0.18s ease, width 0.18s ease;
      }
      .mouth-figure .upper {
        width: 76px;
        height: 16px;
        top: 28px;
        background: linear-gradient(180deg, #d66a5b 0%, #b53c2c 100%);
      }
      .mouth-figure .lower {
        width: 72px;
        height: 20px;
        top: 46px;
        background: linear-gradient(180deg, #d66a5b 0%, #9f3129 100%);
      }
      .mouth-figure.speaking .upper {
        animation: lipTopMove 0.18s ease-in-out infinite alternate;
      }
      .mouth-figure.speaking .lower {
        animation: lipBottomMove 0.18s ease-in-out infinite alternate;
      }
      @keyframes lipTopMove {
        from { top: 28px; width: 76px; }
        to { top: 20px; width: 84px; }
      }
      @keyframes lipBottomMove {
        from { top: 46px; width: 72px; }
        to { top: 54px; width: 82px; }
      }
      .mouth-frame-1 .upper { top: 26px; width: 80px; }
      .mouth-frame-1 .lower { top: 48px; width: 78px; }
      .mouth-frame-2 .upper { top: 22px; width: 86px; }
      .mouth-frame-2 .lower { top: 50px; width: 84px; }
      .mouth-frame-3 .upper { top: 18px; width: 92px; }
      .mouth-frame-3 .lower { top: 52px; width: 88px; }
    </style>
</head>
<body>
    <form id="dictionary-form">
        <label for="word-search">Enter an English word:</label>
        <input id="word-search" type="search" name="word" placeholder="Type or paste a word" autocomplete="off" />
        <button type="submit">Search</button>
    </form>
    <section id="history" style="display:none; margin-top: 1rem;">
        <h3>Search History</h3>
        <ul id="history-list"></ul>
    </section>
    <div id="result"></div>
    <script src="script.js"></script>
</body>
</html>
